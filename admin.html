<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Portfolio</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Cropper.js CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin.css?v=2">
</head>
<body>
    <div id="loader" class="loader active">
        <div class="spinner"></div>
    </div>

    <!-- Login Container -->
    <div id="login-container" class="container" style="display: none;">
        <div class="glass-card login-card">
            <h2><i class="fas fa-lock"></i> Admin Login</h2>
            <form id="login-form">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="admin@example.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <p id="login-error" class="error-text"></p>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboard-container" class="container" style="display: none;">
        <div class="dashboard-header glass-card">
            <h2><i class="fas fa-cog"></i> Portfolio Admin Dashboard</h2>
            <div class="header-actions">
                <span id="user-email" class="user-email"></span>
                <button id="logout-btn" class="btn btn-outline">Logout</button>
            </div>
        </div>

        <form id="data-form">
            <div class="dashboard-grid">
                <!-- Profile Avatar Section -->
                <div class="dashboard-panel glass-card">
                    <h3><i class="fas fa-user-circle"></i> Profile (Avatar)</h3>
                    <p class="help-text">Update your main portfolio avatar.</p>
                    <div class="input-group">
                        <label>Avatar Image URL</label>
                        <input type="text" id="avatar-url" placeholder="assets/avatar.png or https://...">
                        <div class="file-upload-wrapper">
                            <input type="file" id="avatar-file" accept="image/*" class="file-input">
                        </div>
                    </div>
                </div>

                <!-- Music Section -->
                <div class="dashboard-panel glass-card">
                    <h3><i class="fab fa-spotify"></i> Music (Spotify Links)</h3>
                    <p class="help-text">Enter up to 6 Spotify embed links (one per line).</p>
                    <textarea id="music-links" rows="8" placeholder="https://open.spotify.com/embed/track/..."></textarea>
                </div>

                <!-- Billiards Gallery -->
                <div class="dashboard-panel glass-card">
                    <h3><i class="fas fa-8-ball"></i> Gallery: Billiards</h3>
                    <div class="input-group">
                        <label>Cover Image URL</label>
                        <input type="text" id="billiards-cover" placeholder="assets/images/... or https://...">
                        <div class="file-upload-wrapper">
                            <input type="file" id="billiards-cover-file" accept="image/*" class="file-input">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Inside Images (One URL per line)</label>
                        <textarea id="billiards-images" rows="6"></textarea>
                        <div class="file-upload-wrapper">
                            <input type="file" id="billiards-images-file" accept="image/*" multiple class="file-input">
                        </div>
                    </div>
                </div>

                <!-- Motorcycles Gallery -->
                <div class="dashboard-panel glass-card">
                    <h3><i class="fas fa-motorcycle"></i> Gallery: Motorcycles</h3>
                    <div class="input-group">
                        <label>Cover Image URL</label>
                        <input type="text" id="motorcycles-cover" placeholder="assets/images/... or https://...">
                        <div class="file-upload-wrapper">
                            <input type="file" id="motorcycles-cover-file" accept="image/*" class="file-input">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Inside Images (One URL per line)</label>
                        <textarea id="motorcycles-images" rows="6"></textarea>
                        <div class="file-upload-wrapper">
                            <input type="file" id="motorcycles-images-file" accept="image/*" multiple class="file-input">
                        </div>
                    </div>
                </div>

                <!-- Life Gallery -->
                <div class="dashboard-panel glass-card">
                    <h3><i class="fas fa-camera"></i> Gallery: Daily Life</h3>
                    <div class="input-group">
                        <label>Cover Image URL</label>
                        <input type="text" id="life-cover" placeholder="assets/images/... or https://...">
                        <div class="file-upload-wrapper">
                            <input type="file" id="life-cover-file" accept="image/*" class="file-input">
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Inside Images (One URL per line)</label>
                        <textarea id="life-images" rows="6"></textarea>
                        <div class="file-upload-wrapper">
                            <input type="file" id="life-images-file" accept="image/*" multiple class="file-input">
                        </div>
                    </div>
                </div>
            </div>

            <div class="dashboard-footer glass-card">
                <button type="submit" class="btn btn-success" id="save-btn">
                    <i class="fas fa-save"></i> Save All Changes
                </button>
                <span id="save-status" class="save-status"></span>
            </div>
        </form>
    </div>

    <!-- Cropper Modal -->
    <div id="cropper-modal" class="cropper-modal">
        <div class="cropper-modal-content">
            <h3>Crop Image</h3>
            <div class="cropper-container-wrapper">
                <img id="cropper-image" src="" alt="Image to crop">
            </div>
            <div class="cropper-actions">
                <button type="button" id="crop-cancel-btn" class="btn btn-outline">Cancel</button>
                <button type="button" id="crop-save-btn" class="btn btn-primary">Crop & Save</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
    <!-- Cropper.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="admin.js?v=4"></script>
</body>
</html>
